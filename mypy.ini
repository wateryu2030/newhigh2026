[mypy]
# Platform configuration
python_version = 3.14
platform = darwin

# Disallow dynamic typing
disallow_any_generics = False
disallow_subclassing_any = False

# Untyped definitions and calls
disallow_untyped_calls = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False

# None and Optional handling
no_implicit_optional = True
strict_optional = True

# Warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = False
warn_unreachable = False

# Suppress error messages about imports that cannot be resolved
ignore_missing_imports = True

# Allow sub-classing of Any
disallow_subclassing_any = False

# Disallow defining functions without type annotations
disallow_untyped_defs = False

# Disallow defining functions with incomplete type annotations
disallow_incomplete_defs = False

# Check the interior of functions without type annotations
check_untyped_defs = True

# Pretty print error messages
pretty = True

# Show column numbers in error messages
show_column_numbers = True

# Show error codes in error messages
show_error_codes = True

# Cache directory
cache_dir = .mypy_cache

# Exclude directories
exclude = (
    build/|
    dist/|
    .venv/|
    venv/|
    tests/
)

[mypy-core.src.core.*]
# More strict checking for core module
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-strategy.src.strategy_engine.*]
# Strict checking for strategy engine
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-data.src.data.*]
# Strict checking for data module
disallow_untyped_defs = True
check_untyped_defs = True

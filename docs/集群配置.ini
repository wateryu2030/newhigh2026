### 本机你要做的事（按顺序）

1. **定位仓库根目录** `REPO`（任选其一存在者）：  
   - `~/jiqunguanli`  
   - `/Volumes/ragflow/jiqunguanli`  
   若都不存在：停止，告诉用户需先从 Studio 同步仓库（见仓库内 `docs/OTHER_DEVICES_ONE_CLICK.md`）。

2. **对齐 `config.yaml`**（在 `REPO` 下）：  
   - 若不存在：从 `config.example.yaml` 复制为 `config.yaml`。  
   - 用 `config.example.yaml` 对照，确保至少以下段落与权威拓扑一致：`openclaw.cluster.nodes`、`distributed_schedule.nodes`（含 macstudio-01、newhigh-01）、`team.members` 里 mini 的 `endpoint` 为 **.84**。  
   - **不要**把 `app_id` / `app_secret` 写进可被同步到别处的明文；优先环境变量。

3. **若本机存在 OpenClaw 配置目录 `~/.openclaw/`**，则对齐（存在才改，不存在可跳过并备注）：  
   - `~/.openclaw/config.yaml`：`cluster.nodes` 与上表一致，**无 192.168.1.83**。  
   - `~/.openclaw/team_config.yaml`：`mini_knowledge` / `mini_finance` 的 endpoint 为 **192.168.1.84**。  
   - **仅在本机用户为 weijunyu 或明确是 imark 机时**：`~/.openclaw/workspace/weijunyu_config.yaml` 里 AXiaohui 节点为 **.84**。  
   - `~/.openclaw/workspace/config/robot_nodes.json` 与 `robot_nodes_v2.json`：AXiaohui **ip=.84、ssh_user=zhonglian**；Cxiaoer **ssh_user=mac**；imark **ip=.78、ssh_user=weijunyu**；与 `config.example.yaml` 中分布式节点一致；含 Iwork（.77）与 newhigh（.92）条目（可与 Studio 已对齐版本一致）。  
   - **不要修改** `~/.openclaw/logs/`、`gateway*.log`、`agents/**/sessions/*.jsonl` 等历史日志里的旧 IP（保留审计痕迹）。

4. **工作节点环境**：根据本机对应的 **slot_id**，确认文档/脚本中 `CLUSTER_NODE_NAME` 应为本机 slot（如 `macmini-02`）。若用户要跑 worker，应使用仓库内 `extras/nas_oneclick/start-worker.sh <slot>` 或 `scripts/bootstrap_worker_node.sh`（先阅读脚本注释）。Studio 特例见 `scripts/install_studio_login_nohup.sh`，不要强行在 Studio 用 launchd 直接访问 SMB 上的 Python。

5. **挂载检查**（本机应能访问队列与数据卷，名称以 `config.yaml` 中 `distributed_schedule.volumes` 为准，常见为）：  
   `ls /Volumes/ragflow /Volumes/aiwork`  
   若失败，在总结里说明「未挂载 SMB」，不要伪造通过。

6. **全文检索**：在 `REPO` 与（若存在）`~/.openclaw/workspace` 的 **脚本/YAML/JSON（排除 logs、*.jsonl）** 中搜索 `192.168.1.83` 与 `miniuser@192.168.1.`；对仍表示「当前应连的 AXiaohui」的项改为 **.84** 与 **zhonglian**。

7. **输出总结**：列出你改动的文件路径、本机判定的 slot、挂载与仓库路径；未改动的关键项说明原因。

### 约束

- 只改与「拓扑/IP/SSH 用户/OpenClaw 集群列表/robot 节点表」相关的配置与脚本，**不做无关重构**。  
- 与 `config.example.yaml`、本机已有 `config.yaml` 冲突时，**以本仓库 `config.example.yaml` 的结构 + 上文拓扑表为准**合并。  
- 使用工具实际读文件、执行 `ls`/检索，不要凭空假设路径。
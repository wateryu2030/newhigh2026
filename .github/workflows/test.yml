name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx
          pip install -e ./core -e ./gateway
          pip install -e ./data-pipeline 2>/dev/null || true
          pip install -e ./backtest-engine 2>/dev/null || true
          pip install -e ./risk-engine 2>/dev/null || true

      - name: Run gateway tests
        run: pytest gateway/tests -v --tb=short

      - name: Run openclaw_engine tests
        run: |
          pip install -e ./openclaw_engine 2>/dev/null || true
          pytest openclaw_engine/tests -v --tb=short 2>/dev/null || true

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v --tb=short 2>/dev/null || true

      - name: Run integration tests (data/strategy/execution)
        run: |
          pip install -e ./execution-engine 2>/dev/null || true
          pytest tests/test_data_pipeline.py tests/test_strategy_engine.py tests/test_execution_engine.py -v --tb=short 2>/dev/null || true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend and Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E
        run: cd frontend && npx playwright test --project=chromium
        env:
          CI: true

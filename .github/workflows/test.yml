name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/data-pipeline/src:${{ github.workspace }}/gateway/src:${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          pip install -e ./core
          pip install -e ./gateway
          pip install -e ./data-pipeline
          pip install -e ./backtest-engine
          pip install -e ./risk-engine
          pip install -e ./openclaw_engine
          pip install -e ./execution-engine

      - name: Run gateway tests
        run: pytest gateway/tests -v --tb=short

      - name: Run openclaw_engine tests
        run: pytest openclaw_engine/tests -v --tb=short

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v --tb=short

      - name: Run integration tests (data/strategy/execution)
        run: pytest tests/test_data_pipeline.py tests/test_strategy_engine.py tests/test_execution_engine.py -v --tb=short

      - name: Run freshness unit tests
        run: pytest tests/test_freshness.py -v --tb=short

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend and Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E
        run: cd frontend && npx playwright test --project=chromium
        env:
          CI: true

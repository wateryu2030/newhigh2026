# 生产环境配置（APP_ENV=prod 时加载）

app_env: prod
api_host: "0.0.0.0"
api_port: 8000
api_reload: false

# 生产需通过环境变量覆盖 broker/backend
celery_broker_url: "redis://127.0.0.1:6379/0"
celery_result_backend: "redis://127.0.0.1:6379/0"

execution_simulated: false
execution_real_enabled: true

log_level: WARNING
log_json: true
